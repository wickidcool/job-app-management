name: Set Worker Secrets

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target Cloudflare Workers environment'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - dev
          - staging

jobs:
  set-secrets:
    name: Push secrets to Cloudflare Worker
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Set ANTHROPIC_API_KEY on Worker
        working-directory: packages/api
        run: echo "$ANTHROPIC_API_KEY" | npx wrangler secret put ANTHROPIC_API_KEY --env ${{ inputs.environment }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
