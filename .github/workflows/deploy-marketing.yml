name: Deploy Marketing Site

on:
  push:
    branches: [main]
    paths:
      - 'packages/marketing/**'
      - '.github/workflows/deploy-marketing.yml'
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  deploy-marketing:
    name: Deploy Marketing to Cloudflare Pages
    runs-on: ubuntu-latest
    # Gates cleared 2026-06-11: domain registered (WIC-506 done), board approved (WIC-522 approval 35db58de).
    # Secret: CLOUDFLARE_CAREERPIN_API (repo-level, set by board 2026-06-11).
    environment: production
    concurrency:
      group: marketing-deploy
      cancel-in-progress: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          if [ -z "$CF_API_TOKEN" ]; then
            echo "::error::CLOUDFLARE_CAREERPIN_API secret not configured."
            echo "Set it in GitHub → Settings → Secrets and variables → Actions (repo level)."
            exit 1
          fi
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_CAREERPIN_API }}

      - name: Resolve Cloudflare account ID
        id: cf-account
        run: |
          RESPONSE=$(curl -sf -H "Authorization: Bearer $CF_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts")
          COUNT=$(echo "$RESPONSE" | jq '.result | length')
          if [ "$COUNT" -eq 0 ]; then
            echo "::error::No Cloudflare accounts found for CLOUDFLARE_CAREERPIN_API token."
            exit 1
          fi
          if [ "$COUNT" -gt 1 ]; then
            echo "::error::Multiple CF accounts found. Add CLOUDFLARE_ACCOUNT_ID secret."
            exit 1
          fi
          ACCOUNT_ID=$(echo "$RESPONSE" | jq -r '.result[0].id')
          echo "account_id=$ACCOUNT_ID" >> "$GITHUB_OUTPUT"
          echo "Resolved account ID: ${ACCOUNT_ID:0:8}..."
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_CAREERPIN_API }}

      - name: Set up DNS for all careerpin domains
        run: |
          set -euo pipefail
          APP_ZONE="ace9c419c6a5129cf7b8d104528a29e1"
          IO_ZONE="e31283e2f9ddc738087daaf4698fb88c"

          cf_api() {
            local method="$1" path="$2" data="${3:-}"
            local args=(-s -X "$method" "https://api.cloudflare.com/client/v4$path"
              -H "Authorization: Bearer $CF_API_TOKEN")
            [ -n "$data" ] && args+=(-H "Content-Type: application/json" -d "$data")
            local resp
            resp=$(curl "${args[@]}")
            local ok
            ok=$(echo "$resp" | jq -r '.success')
            if [ "$ok" != "true" ]; then
              echo "::error::CF API $method $path failed: $(echo "$resp" | jq -r '[.errors[]?.message] | join(", ")')"
              exit 1
            fi
            echo "$resp"
          }

          cname_upsert() {
            local zone="$1" name="$2" content="$3"
            # Remove conflicting A records
            local a_ids
            a_ids=$(curl -s -H "Authorization: Bearer $CF_API_TOKEN" \
              "https://api.cloudflare.com/client/v4/zones/$zone/dns_records?type=A&name=$name" \
              | jq -r '.result[]?.id // empty')
            for id in $a_ids; do
              echo "Removing A record $id at $name..."
              cf_api DELETE "/zones/$zone/dns_records/$id" > /dev/null
            done
            local payload
            payload=$(printf '{"type":"CNAME","name":"%s","content":"%s","proxied":true,"ttl":1}' "$name" "$content")
            local existing_id
            existing_id=$(curl -s -H "Authorization: Bearer $CF_API_TOKEN" \
              "https://api.cloudflare.com/client/v4/zones/$zone/dns_records?type=CNAME&name=$name" \
              | jq -r '.result[0].id // empty')
            if [ -n "$existing_id" ]; then
              echo "Updating CNAME $name ($existing_id)..."
              cf_api PATCH "/zones/$zone/dns_records/$existing_id" "$payload" | jq -c '{success}'
            else
              echo "Creating CNAME $name → $content..."
              cf_api POST "/zones/$zone/dns_records" "$payload" | jq -c '{success}'
            fi
          }

          # careerpin.app apex → marketing site
          cname_upsert "$APP_ZONE" "careerpin.app" "careerpin-marketing.pages.dev"
          # Redirect surfaces → same marketing project (handled via _redirects in the site)
          cname_upsert "$APP_ZONE" "www.careerpin.app" "careerpin-marketing.pages.dev"
          cname_upsert "$IO_ZONE" "careerpin.io" "careerpin-marketing.pages.dev"
          cname_upsert "$IO_ZONE" "www.careerpin.io" "careerpin-marketing.pages.dev"
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_CAREERPIN_API }}

      - name: Ensure Pages project exists
        run: |
          curl -sf -X POST \
            "https://api.cloudflare.com/client/v4/accounts/$ACCT/pages/projects" \
            -H "Authorization: Bearer $CF_API_TOKEN" -H "Content-Type: application/json" \
            -d '{"name":"careerpin-marketing","production_branch":"main"}' \
            | jq -c '{success, errors: [.errors[].message]}' || true
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_CAREERPIN_API }}
          ACCT: ${{ steps.cf-account.outputs.account_id }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Deploy to Cloudflare Pages
        run: |
          npx --yes wrangler@3 pages deploy packages/marketing \
            --project-name=careerpin-marketing \
            --commit-dirty=true 2>&1 | tee /tmp/wrangler.log
          WRANGLER_EXIT=${PIPESTATUS[0]}
          if [ "$WRANGLER_EXIT" -ne 0 ]; then
            # wrangler sometimes exits non-zero after a successful file upload (custom-domain
            # verification step fails). Verify the site is actually reachable before failing.
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "https://careerpin.app" || echo "000")
            if [ "$STATUS" -eq 200 ]; then
              echo "wrangler exited $WRANGLER_EXIT but careerpin.app is live (HTTP 200) — deploy ok"
            else
              ERR=$(tail -20 /tmp/wrangler.log | tr '\n' ' ')
              echo "::error::wrangler pages deploy failed (exit $WRANGLER_EXIT, site HTTP $STATUS): $ERR"
              exit "$WRANGLER_EXIT"
            fi
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_CAREERPIN_API }}
          CLOUDFLARE_ACCOUNT_ID: ${{ steps.cf-account.outputs.account_id }}

      - name: Add redirect custom domains to Pages project
        run: |
          set -euo pipefail
          add_domain() {
            local domain="$1"
            echo "Adding custom domain: $domain"
            resp=$(curl -s -X POST \
              "https://api.cloudflare.com/client/v4/accounts/$ACCT/pages/projects/careerpin-marketing/domains" \
              -H "Authorization: Bearer $CF_API_TOKEN" -H "Content-Type: application/json" \
              -d "{\"name\":\"$domain\"}")
            if [ "$(echo "$resp" | jq -r '.success')" = "true" ]; then
              echo "$domain: added ok"
            else
              local msg
              msg=$(echo "$resp" | jq -r '[.errors[]?.message] | join(", ")')
              if echo "$msg" | grep -qi "already\|exists"; then
                echo "$domain: already configured (ok)"
              else
                echo "::warning::Custom domain $domain: $msg"
              fi
            fi
          }
          add_domain "www.careerpin.app"
          add_domain "careerpin.io"
          add_domain "www.careerpin.io"
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_CAREERPIN_API }}
          ACCT: ${{ steps.cf-account.outputs.account_id }}
