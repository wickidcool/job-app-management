name: Deploy Marketing Site

on:
  push:
    branches: [main]
    paths:
      - 'packages/marketing/**'
      - '.github/workflows/deploy-marketing.yml'
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  deploy-marketing:
    name: Deploy Marketing to Cloudflare Pages
    runs-on: ubuntu-latest
    # Gates cleared 2026-06-11: domain registered (WIC-506 done), board approved (WIC-522 approval 35db58de).
    # Secret: CLOUDFLARE_CAREERPIN_API (repo-level, set by board 2026-06-11).
    environment: production
    concurrency:
      group: marketing-deploy
      cancel-in-progress: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          if [ -z "$CF_API_TOKEN" ]; then
            echo "::error::CLOUDFLARE_CAREERPIN_API secret not configured."
            echo "Set it in GitHub → Settings → Secrets and variables → Actions (repo level)."
            exit 1
          fi
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_CAREERPIN_API }}

      - name: Resolve Cloudflare account ID
        id: cf-account
        run: |
          RESPONSE=$(curl -sf -H "Authorization: Bearer $CF_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts")
          COUNT=$(echo "$RESPONSE" | jq '.result | length')
          if [ "$COUNT" -eq 0 ]; then
            echo "::error::No Cloudflare accounts found for CLOUDFLARE_CAREERPIN_API token."
            exit 1
          fi
          if [ "$COUNT" -gt 1 ]; then
            echo "::error::Multiple CF accounts found. Add CLOUDFLARE_ACCOUNT_ID secret."
            exit 1
          fi
          ACCOUNT_ID=$(echo "$RESPONSE" | jq -r '.result[0].id')
          echo "account_id=$ACCOUNT_ID" >> "$GITHUB_OUTPUT"
          echo "Resolved account ID: ${ACCOUNT_ID:0:8}..."
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_CAREERPIN_API }}

      - name: Set up DNS for careerpin.app
        run: |
          # Zone IDs (fixed — registered 2026-06-11)
          ZONE="ace9c419c6a5129cf7b8d104528a29e1"
          upsert() {
            local type="$1" name="$2" content="$3"
            local existing
            existing=$(curl -sf -H "Authorization: Bearer $CF_API_TOKEN" \
              "https://api.cloudflare.com/client/v4/zones/$ZONE/dns_records?type=$type&name=$name" \
              | jq -r '.result[0].id // empty')
            local payload
            payload=$(printf '{"type":"%s","name":"%s","content":"%s","proxied":true,"ttl":1}' \
              "$type" "$name" "$content")
            if [ -n "$existing" ]; then
              echo "Updating $type $name..."
              curl -sf -X PATCH \
                "https://api.cloudflare.com/client/v4/zones/$ZONE/dns_records/$existing" \
                -H "Authorization: Bearer $CF_API_TOKEN" -H "Content-Type: application/json" \
                -d "$payload" | jq -c '{success, errors: [.errors[].message]}'
            else
              echo "Creating $type $name..."
              curl -sf -X POST \
                "https://api.cloudflare.com/client/v4/zones/$ZONE/dns_records" \
                -H "Authorization: Bearer $CF_API_TOKEN" -H "Content-Type: application/json" \
                -d "$payload" | jq -c '{success, errors: [.errors[].message]}'
            fi
          }
          # Apex CNAME → CF Pages (flattened at root)
          upsert CNAME careerpin.app careerpin-marketing.pages.dev
          # Remove www from CF Pages custom domains — redirect worker handles www
          ACCT="${{ steps.cf-account.outputs.account_id }}"
          curl -sf -X DELETE \
            "https://api.cloudflare.com/client/v4/accounts/$ACCT/pages/projects/careerpin-marketing/domains/www.careerpin.app" \
            -H "Authorization: Bearer $CF_API_TOKEN" | jq -c '{success}' || true
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_CAREERPIN_API }}

      - name: Ensure Pages project exists
        run: |
          curl -sf -X POST \
            "https://api.cloudflare.com/client/v4/accounts/$ACCT/pages/projects" \
            -H "Authorization: Bearer $CF_API_TOKEN" -H "Content-Type: application/json" \
            -d '{"name":"careerpin-marketing","production_branch":"main"}' \
            | jq -c '{success, errors: [.errors[].message]}' || true
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_CAREERPIN_API }}
          ACCT: ${{ steps.cf-account.outputs.account_id }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_CAREERPIN_API }}
          accountId: ${{ steps.cf-account.outputs.account_id }}
          command: pages deploy packages/marketing --project-name=careerpin-marketing --commit-dirty=true
