name: Deploy Marketing Site

on:
  push:
    branches: [main]
    paths:
      - 'packages/marketing/**'
      - '.github/workflows/deploy-marketing.yml'
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  deploy-marketing:
    name: Deploy Marketing to Cloudflare Pages
    runs-on: ubuntu-latest
    # Disabled until: (1) careerpin.app domain is registered (see WIC-506), (2) CLOUDFLARE_API_TOKEN + CLOUDFLARE_ACCOUNT_ID
    # are configured in GitHub → Settings → Environments → production, (3) board has approved deployment.
    # Remove `if: false` once all three gates are cleared.
    if: false
    environment: production
    concurrency:
      group: marketing-deploy
      cancel-in-progress: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          missing=""
          [ -z "$CF_API_TOKEN" ]   && missing="$missing CLOUDFLARE_API_TOKEN"
          [ -z "$CF_ACCOUNT_ID" ]  && missing="$missing CLOUDFLARE_ACCOUNT_ID"
          if [ -n "$missing" ]; then
            echo "::error::Required secrets not configured:$missing"
            echo "Set these in GitHub → Settings → Secrets and variables → Environment: production."
            exit 1
          fi
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy packages/marketing --project-name=careerpin-marketing --commit-dirty=true
