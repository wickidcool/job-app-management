name: Deploy Redirect Pages

on:
  push:
    branches: [main]
    paths:
      - 'packages/infra/redirect-pages/**'
      - '.github/workflows/deploy-redirects.yml'
  workflow_dispatch:

jobs:
  deploy-redirects:
    name: Deploy careerpin-redirects Pages site
    runs-on: ubuntu-latest
    # Gates cleared 2026-06-11: DNS records live, board approved (WIC-522 approval 35db58de).
    # Secret: CLOUDFLARE_CAREERPIN_API (repo-level). Needs Account:Cloudflare Pages:Edit + Zone:DNS:Edit.
    # Uses CF Pages _redirects (not Workers) so no Account:Workers Scripts:Edit required.
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          if [ -z "$CF_API_TOKEN" ]; then
            echo "::error::CLOUDFLARE_CAREERPIN_API secret not configured."
            echo "Set it in GitHub → Settings → Secrets and variables → Actions (repo level)."
            exit 1
          fi
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_CAREERPIN_API }}

      - name: Resolve Cloudflare account ID
        id: cf-account
        run: |
          RESPONSE=$(curl -sf -H "Authorization: Bearer $CF_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts")
          COUNT=$(echo "$RESPONSE" | jq '.result | length')
          if [ "$COUNT" -eq 0 ]; then
            echo "::error::No Cloudflare accounts found for CLOUDFLARE_CAREERPIN_API token."
            exit 1
          fi
          if [ "$COUNT" -gt 1 ]; then
            echo "::error::Multiple CF accounts found. Add account_id to wrangler.toml."
            exit 1
          fi
          ACCOUNT_ID=$(echo "$RESPONSE" | jq -r '.result[0].id')
          echo "account_id=$ACCOUNT_ID" >> "$GITHUB_OUTPUT"
          echo "Resolved account ID: ${ACCOUNT_ID:0:8}..."
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_CAREERPIN_API }}

      - name: Set up DNS (CNAME to careerpin-redirects.pages.dev)
        run: |
          set -euo pipefail
          cf_cname_upsert() {
            local zone="$1" name="$2" content="$3"
            # Remove any conflicting A records
            local a_ids
            a_ids=$(curl -s -H "Authorization: Bearer $CF_API_TOKEN" \
              "https://api.cloudflare.com/client/v4/zones/$zone/dns_records?type=A&name=$name" \
              | jq -r '.result[]?.id // empty')
            for id in $a_ids; do
              echo "Removing A record $id at $name..."
              resp=$(curl -s -X DELETE \
                "https://api.cloudflare.com/client/v4/zones/$zone/dns_records/$id" \
                -H "Authorization: Bearer $CF_API_TOKEN")
              if [ "$(echo "$resp" | jq -r '.success')" != "true" ]; then
                echo "::error::DNS delete failed: $(echo "$resp" | jq -r '[.errors[]?.message] | join(", ")')"
                exit 1
              fi
            done
            local payload
            payload=$(printf '{"type":"CNAME","name":"%s","content":"%s","proxied":true,"ttl":1}' "$name" "$content")
            local existing_id
            existing_id=$(curl -s -H "Authorization: Bearer $CF_API_TOKEN" \
              "https://api.cloudflare.com/client/v4/zones/$zone/dns_records?type=CNAME&name=$name" \
              | jq -r '.result[0].id // empty')
            local resp
            if [ -n "$existing_id" ]; then
              echo "Updating CNAME $name ($existing_id)..."
              resp=$(curl -s -X PATCH \
                "https://api.cloudflare.com/client/v4/zones/$zone/dns_records/$existing_id" \
                -H "Authorization: Bearer $CF_API_TOKEN" -H "Content-Type: application/json" \
                -d "$payload")
            else
              echo "Creating CNAME $name → $content..."
              resp=$(curl -s -X POST \
                "https://api.cloudflare.com/client/v4/zones/$zone/dns_records" \
                -H "Authorization: Bearer $CF_API_TOKEN" -H "Content-Type: application/json" \
                -d "$payload")
            fi
            if [ "$(echo "$resp" | jq -r '.success')" != "true" ]; then
              echo "::error::DNS write failed for $name: $(echo "$resp" | jq -r '[.errors[]?.message] | join(", ")')"
              exit 1
            fi
            echo "CNAME $name → $content: ok"
          }
          APP_ZONE="ace9c419c6a5129cf7b8d104528a29e1"
          IO_ZONE="e31283e2f9ddc738087daaf4698fb88c"
          cf_cname_upsert "$APP_ZONE" "www.careerpin.app" "careerpin-redirects.pages.dev"
          cf_cname_upsert "$IO_ZONE" "careerpin.io" "careerpin-redirects.pages.dev"
          cf_cname_upsert "$IO_ZONE" "www.careerpin.io" "careerpin-redirects.pages.dev"
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_CAREERPIN_API }}

      - name: Ensure redirect Pages project exists
        run: |
          curl -sf -X POST \
            "https://api.cloudflare.com/client/v4/accounts/$ACCT/pages/projects" \
            -H "Authorization: Bearer $CF_API_TOKEN" -H "Content-Type: application/json" \
            -d '{"name":"careerpin-redirects","production_branch":"main"}' \
            | jq -c '{success, errors: [.errors[].message]}' || true
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_CAREERPIN_API }}
          ACCT: ${{ steps.cf-account.outputs.account_id }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Deploy redirect site to Cloudflare Pages
        run: |
          npx --yes wrangler@3 pages deploy packages/infra/redirect-pages \
            --project-name=careerpin-redirects \
            --commit-dirty=true 2>&1 | tee /tmp/wrangler-redirects.log
          WRANGLER_EXIT=${PIPESTATUS[0]}
          if [ "$WRANGLER_EXIT" -ne 0 ]; then
            # wrangler sometimes exits non-zero after a successful file upload
            # (custom-domain verification step fails). Verify the Pages site is
            # reachable — a 3xx means the _redirects file is live.
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 \
              "https://careerpin-redirects.pages.dev/" || echo "000")
            if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ]; then
              echo "wrangler exited $WRANGLER_EXIT but careerpin-redirects.pages.dev responded HTTP $STATUS — deploy ok"
            else
              ERR=$(tail -20 /tmp/wrangler-redirects.log | tr '\n' ' ')
              echo "::error::wrangler pages deploy failed (exit $WRANGLER_EXIT, pages.dev HTTP $STATUS): $ERR"
              exit "$WRANGLER_EXIT"
            fi
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_CAREERPIN_API }}
          CLOUDFLARE_ACCOUNT_ID: ${{ steps.cf-account.outputs.account_id }}

      - name: Add custom domains to redirect Pages project
        run: |
          set -euo pipefail
          add_domain() {
            local domain="$1"
            echo "Adding custom domain: $domain"
            resp=$(curl -s -X POST \
              "https://api.cloudflare.com/client/v4/accounts/$ACCT/pages/projects/careerpin-redirects/domains" \
              -H "Authorization: Bearer $CF_API_TOKEN" -H "Content-Type: application/json" \
              -d "{\"name\":\"$domain\"}")
            if [ "$(echo "$resp" | jq -r '.success')" = "true" ]; then
              echo "$domain: added ok"
            else
              local msg
              msg=$(echo "$resp" | jq -r '[.errors[]?.message] | join(", ")')
              if echo "$msg" | grep -qi "already\|exists"; then
                echo "$domain: already configured (ok)"
              else
                echo "::warning::Custom domain $domain: $msg"
              fi
            fi
          }
          add_domain "www.careerpin.app"
          add_domain "careerpin.io"
          add_domain "www.careerpin.io"
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_CAREERPIN_API }}
          ACCT: ${{ steps.cf-account.outputs.account_id }}
