name: Deploy Redirect Worker

on:
  push:
    branches: [main]
    paths:
      - 'packages/infra/redirect-worker/**'
      - '.github/workflows/deploy-redirects.yml'
  workflow_dispatch:

jobs:
  deploy-redirects:
    name: Deploy careerpin-redirects worker
    runs-on: ubuntu-latest
    # Gates cleared 2026-06-11: DNS records live, board approved (WIC-522 approval 35db58de).
    # CLOUDFLARE_API_TOKEN + CLOUDFLARE_ACCOUNT_ID must be set in GitHub → Settings → Secrets → Actions.
    defaults:
      run:
        working-directory: packages/infra/redirect-worker
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          missing=""
          [ -z "$CF_API_TOKEN" ]   && missing="$missing CLOUDFLARE_API_TOKEN"
          [ -z "$CF_ACCOUNT_ID" ]  && missing="$missing CLOUDFLARE_ACCOUNT_ID"
          if [ -n "$missing" ]; then
            echo "::error::Required secrets not configured:$missing"
            echo "Set these in GitHub → Settings → Secrets and variables → Actions."
            exit 1
          fi
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy redirect worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: packages/infra/redirect-worker
          command: deploy
