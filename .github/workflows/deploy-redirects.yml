name: Deploy Redirect Worker

on:
  push:
    branches: [main]
    paths:
      - 'packages/infra/redirect-worker/**'
      - '.github/workflows/deploy-redirects.yml'
  workflow_dispatch:

jobs:
  deploy-redirects:
    name: Deploy careerpin-redirects worker
    runs-on: ubuntu-latest
    # Gates cleared 2026-06-11: DNS records live, board approved (WIC-522 approval 35db58de).
    # Secret: CLOUDFLARE_CAREERPIN_API (repo-level, set by board 2026-06-11).
    defaults:
      run:
        working-directory: packages/infra/redirect-worker
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          if [ -z "$CF_API_TOKEN" ]; then
            echo "::error::CLOUDFLARE_CAREERPIN_API secret not configured."
            echo "Set it in GitHub → Settings → Secrets and variables → Actions (repo level)."
            exit 1
          fi
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_CAREERPIN_API }}

      - name: Resolve Cloudflare account ID
        id: cf-account
        run: |
          RESPONSE=$(curl -sf -H "Authorization: Bearer $CF_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts")
          COUNT=$(echo "$RESPONSE" | jq '.result | length')
          if [ "$COUNT" -eq 0 ]; then
            echo "::error::No Cloudflare accounts found for CLOUDFLARE_CAREERPIN_API token."
            exit 1
          fi
          if [ "$COUNT" -gt 1 ]; then
            echo "::error::Multiple CF accounts found. Add account_id to wrangler.toml."
            exit 1
          fi
          ACCOUNT_ID=$(echo "$RESPONSE" | jq -r '.result[0].id')
          echo "account_id=$ACCOUNT_ID" >> "$GITHUB_OUTPUT"
          echo "Resolved account ID: ${ACCOUNT_ID:0:8}..."
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_CAREERPIN_API }}

      - name: Set up DNS for redirect routes
        run: |
          set -euo pipefail
          cf_dns_upsert() {
            local zone="$1" type="$2" name="$3" content="$4"
            local payload
            payload=$(printf '{"type":"%s","name":"%s","content":"%s","proxied":true,"ttl":1}' \
              "$type" "$name" "$content")
            local list_resp
            list_resp=$(curl -s -H "Authorization: Bearer $CF_API_TOKEN" \
              "https://api.cloudflare.com/client/v4/zones/$zone/dns_records?type=$type&name=$name")
            if [ "$(echo "$list_resp" | jq -r '.success')" != "true" ]; then
              echo "::error::DNS read failed for $type $name: $(echo "$list_resp" | jq -r '[.errors[]?.message] | join(", ")')"
              exit 1
            fi
            local existing_id
            existing_id=$(echo "$list_resp" | jq -r '.result[0].id // empty')
            local resp
            if [ -n "$existing_id" ]; then
              echo "Updating $type $name ($existing_id)..."
              resp=$(curl -s -X PATCH \
                "https://api.cloudflare.com/client/v4/zones/$zone/dns_records/$existing_id" \
                -H "Authorization: Bearer $CF_API_TOKEN" -H "Content-Type: application/json" \
                -d "$payload")
            else
              echo "Creating $type $name → $content..."
              resp=$(curl -s -X POST \
                "https://api.cloudflare.com/client/v4/zones/$zone/dns_records" \
                -H "Authorization: Bearer $CF_API_TOKEN" -H "Content-Type: application/json" \
                -d "$payload")
            fi
            if [ "$(echo "$resp" | jq -r '.success')" != "true" ]; then
              echo "::error::DNS write failed for $type $name: $(echo "$resp" | jq -r '[.errors[]?.message] | join(", ")')"
              exit 1
            fi
            echo "$type $name: ok"
          }
          APP_ZONE="ace9c419c6a5129cf7b8d104528a29e1"
          IO_ZONE="e31283e2f9ddc738087daaf4698fb88c"
          cf_dns_upsert "$APP_ZONE" A www.careerpin.app 192.0.2.1
          cf_dns_upsert "$IO_ZONE" A careerpin.io 192.0.2.1
          cf_dns_upsert "$IO_ZONE" A www.careerpin.io 192.0.2.1
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_CAREERPIN_API }}

      - name: Deploy redirect worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_CAREERPIN_API }}
          accountId: ${{ steps.cf-account.outputs.account_id }}
          workingDirectory: packages/infra/redirect-worker
          command: deploy
