name: Deploy Redirect Worker

on:
  push:
    branches: [main]
    paths:
      - 'packages/infra/redirect-worker/**'
      - '.github/workflows/deploy-redirects.yml'
  workflow_dispatch:

jobs:
  deploy-redirects:
    name: Deploy careerpin-redirects worker
    runs-on: ubuntu-latest
    # Gates cleared 2026-06-11: DNS records live, board approved (WIC-522 approval 35db58de).
    # Secret: CLOUDFLARE_CAREERPIN_API (repo-level, set by board 2026-06-11).
    defaults:
      run:
        working-directory: packages/infra/redirect-worker
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          if [ -z "$CF_API_TOKEN" ]; then
            echo "::error::CLOUDFLARE_CAREERPIN_API secret not configured."
            echo "Set it in GitHub → Settings → Secrets and variables → Actions (repo level)."
            exit 1
          fi
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_CAREERPIN_API }}

      - name: Deploy redirect worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_CAREERPIN_API }}
          workingDirectory: packages/infra/redirect-worker
          command: deploy
