name = "careerpin-redirects"
main = "worker.js"
compatibility_date = "2026-06-09"

# Routes: bind this worker to www.careerpin.com, careerpin.app, and careerpin.io
# (requires those domains to be active in the same Cloudflare account)
# Uncomment and fill after domains are registered:
# routes = [
#   { pattern = "www.careerpin.com/*", zone_name = "careerpin.com" },
#   { pattern = "careerpin.app/*",     zone_name = "careerpin.app" },
#   { pattern = "careerpin.io/*",      zone_name = "careerpin.io" },
# ]
